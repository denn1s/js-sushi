<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Sushi — Learn JavaScript Through Arrays</title>
  <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="manifest" href="favicon/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/belt.css">
  <link rel="stylesheet" href="css/wood-grain.css">
  <link rel="stylesheet" href="css/bento.css">
  <link rel="stylesheet" href="css/title.css">
  <link rel="stylesheet" href="css/instructions.css">
  <link rel="stylesheet" href="css/editor-area.css">
</head>
<body>

  <!-- SVG filter for wood grain texture — remove with css/wood-grain.css -->
  <svg width="0" height="0" style="position:absolute">
    <filter id="wood-grain">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.02 0.2"
        numOctaves="4"
        seed="3"
        stitchTiles="stitch"
      />
      <feColorMatrix type="saturate" values="0" />
    </filter>
  </svg>

  <main class="bento">
    <div class="bento-card title-area">
      <div class="title-left">
        <img class="mascot" src="svg/mascot.svg" alt="Sushi mascot">
        <h1 class="game-title"><span class="title-js">JS</span> <span class="title-sushi">Sushi</span></h1>
      </div>
      <div class="title-right">
        <button class="level-dropdown" id="level-dropdown">
          Level <span id="current-level">1</span> of <span id="total-levels">40</span>
          <span class="dropdown-arrow">&#9662;</span>
        </button>
        <div class="level-modal-overlay hidden" id="level-modal-overlay"></div>
        <div class="level-modal hidden" id="level-modal">
          <div class="level-modal-title">Select Level</div>
          <div class="level-grid" id="level-grid"></div>
        </div>
        <div class="nav-arrows">
          <button class="arrow-btn arrow-left" id="prev-btn">
            <span class="arrow-icon">&lsaquo;</span>
          </button>
          <button class="arrow-btn arrow-right" id="next-btn">
            <span class="arrow-icon">&rsaquo;</span>
          </button>
        </div>
      </div>
    </div>
    <div class="bento-card instructions-area">
      <div class="instructions-header">
        <h2 class="instructions-title" id="level-title">1. Your First Belt</h2>
        <p class="instructions-subtitle" id="level-subtitle">Array literal syntax</p>
      </div>
      <div class="instructions-body" id="level-description">
        <p>Create your first sushi belt by writing an array with <code>'salmon'</code> inside it.</p>
      </div>
      <div class="hint-wrapper">
        <button class="hint-btn" id="hint-btn">
          <img class="hint-icon" src="svg/light.svg" alt="">
          <span>Show Hint</span>
        </button>
        <div class="hint-modal-overlay hidden" id="hint-modal-overlay"></div>
        <div class="hint-modal hidden" id="hint-modal">
          <p id="level-hint">Use square brackets to create an array.</p>
        </div>
      </div>
    </div>
    <div class="bento-card editor-area">
      <div class="editor-topbar">
        <span class="editor-topbar-title">Code Editor</span>
      </div>
      <div class="editor-content">
        <div class="editor-body">
          <div id="editor-container"></div>
        </div>
        <div class="editor-run">
          <button class="run-btn" id="run-btn">
          Run
          <svg class="play-icon" viewBox="0 0 24 24" fill="var(--content-text)">
            <path d="M6 4.5c0-1.2 1.3-1.9 2.3-1.2l11.1 7.5c.9.6.9 1.8 0 2.4L8.3 20.7C7.3 21.4 6 20.7 6 19.5z"/>
          </svg>
        </button>
        </div>
      </div>
    </div>
    <div class="bento-card sushi-area">
      <div class="belt-container" id="belt-display"></div>
      <div class="belt-container second-belt hidden" id="belt-display-2"></div>
      <div class="plate-container hidden" id="plate-display"></div>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
